<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      background-color: #ffffff;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2c3e50;
      font-size: 24px;
    }
    p {
      color: #555;
      line-height: 1.8;
      font-size: 16px;
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #aaa;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- כאן כותבים את תוכן האימייל -->
    <h1>שלום לחברי הקהילה,</h1>

    <p>
      כתבו כאן את תוכן ההודעה שלכם.<br>
      אפשר להשתמש בכמה פסקאות.
    </p>

    <p>
      מצורף פרוספקט לעיונכם.
    </p>

    <!-- בעתיד: להוסיף כאן {{name}} לפרסונליזציה -->

    <div class="footer">
      בברכה,<br>
      <strong>שם הקהילה / השולח</strong>
    </div>

  </div>
</body>
</html>
